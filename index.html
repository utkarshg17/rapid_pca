<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapid PCA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.65);
      --soft: rgba(255, 255, 255, 0.08);
      --soft-2: rgba(255, 255, 255, 0.14);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--soft-2);
    }

    .brand {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
    }

    .login-btn {
      background: transparent;
      color: white;
      border: 1px solid white;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .login-btn:hover {
      background: white;
      color: black;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .hero-inner {
      max-width: 850px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 56px;
      line-height: 1.1;
      font-weight: 600;
    }

    .subtitle {
      margin: 24px auto 0;
      max-width: 680px;
      font-size: 18px;
      line-height: 1.7;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .header {
        padding: 18px 20px;
      }

      h1 {
        font-size: 38px;
      }

      .subtitle {
        font-size: 16px;
      }

      .login-btn {
        padding: 9px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">Rapid PCA</div>
      <button class="login-btn">Login</button>
    </header>

    <section class="hero">
      <div class="hero-inner">
        <div class="eyebrow">Construction Data Management</div>
        <h1>Welcome to Rapid PCA</h1>
        <p class="subtitle">
          A simple platform to connect field updates with office visibility in one place.
        </p>
      </div>
    </section>
  </div>
</body>
</html>
